<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sam Live</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:-apple-system;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
#phone{
  width:420px;
  height:800px;
  background:#000;
  border-radius:40px;
  border:10px solid #111;
  display:flex;
  flex-direction:column;
}
#chat{
  flex:1;
  padding:12px;
  overflow:auto;
  display:flex;
  flex-direction:column;
}
.bubble{
  max-width:70%;
  padding:12px;
  margin:6px;
  border-radius:20px;
  color:white;
}
.user{ align-self:flex-end; background:#0b93f6; }
.sam{ align-self:flex-start; background:#444; }

#input{
  display:flex;
  padding:10px;
  background:#111;
}
#input input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  margin-right:8px;
}
#input button{
  padding:10px 14px;
  border:none;
  border-radius:20px;
  background:#0b93f6;
  color:white;
}
</style>
</head>

<body>
<div id="phone">

<div id="chat"></div>

<div id="input">
  <input id="msg" placeholder="Escribe...">
  <button onclick="send()">Enviar</button>
</div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io("https://sam-backend-production-cafb.up.railway.app");
const sessionId = "evento-cda";

let nombre = localStorage.getItem("nombre");
let estado = nombre ? "chat" : "nombre";

// UI
function agregar(user, texto, esSam=false){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "bubble " + (esSam ? "sam" : "user");
  div.innerHTML = `<b>${user}</b><br>${texto}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// inicio
setTimeout(()=>{
  if (!nombre){
    agregar("Sam", "hey… 👀", true);
    setTimeout(()=>{
      agregar("Sam", "¿cómo te llamas?", true);
    }, 700);
  } else {
    agregar("Sam", `qué onda ${nombre} 👀`, true);
  }
}, 500);

// enviar
function send(){
  const msg = document.getElementById("msg").value.trim();
  if (!msg) return;

  document.getElementById("msg").value = "";

  if (estado === "nombre"){
    nombre = msg;
    localStorage.setItem("nombre", nombre);
    estado = "chat";

    agregar(nombre, msg);

    setTimeout(()=>{
      agregar("Sam", "va, ya estás dentro 👀", true);
    }, 500);

    return;
  }

  agregar(nombre, msg);

  socket.emit("msg", {
    nombre,
    mensaje: msg,
    sessionId
  });
}

// sockets
socket.on("chat", (m)=>{
  agregar(m.nombre, m.mensaje);
});

socket.on("sam", (m)=>{
  setTimeout(()=>{
    agregar("Sam", m.text, true);
  }, 500);
});
</script>

</body>
</html>
