<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sam Live</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:-apple-system;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#phone{
  width:420px;
  height:800px;
  background:#000;
  border-radius:40px;
  border:10px solid #111;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}

#chat{
  flex:1;
  padding:12px;
  overflow:auto;
  display:flex;
  flex-direction:column;
}

.bubble{
  max-width:70%;
  padding:12px;
  margin:6px;
  border-radius:20px;
  color:white;
  font-size:14px;
}
.user{ align-self:flex-end; background:#0b93f6; }
.sam{ align-self:flex-start; background:#444; }

#typing{
  font-size:12px;color:#aaa;padding-left:10px;height:16px;
}

#input{
  display:flex;padding:10px;background:#111;
}
#input input{
  flex:1;padding:10px;border-radius:20px;border:none;margin-right:8px;
}
#input button{
  padding:10px 14px;border:none;border-radius:20px;background:#0b93f6;color:#fff;
}
</style>
</head>

<body>
<div id="phone">

<div id="chat"></div>
<div id="typing"></div>

<div id="input">
  <input id="msg" placeholder="Escribe...">
  <button onclick="send()">Enviar</button>
</div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io("https://sam-backend-production-cafb.up.railway.app");
const sessionId = "evento-cda";

let nombre = localStorage.getItem("nombre");
let esperandoNombre = false;

// ===== VOZ =====
function hablar(texto){
  const s = new SpeechSynthesisUtterance(texto);
  s.lang = "es-MX";
  s.rate = 0.95;
  s.pitch = 1.05;
  speechSynthesis.speak(s);
}
document.body.addEventListener("click", ()=> speechSynthesis.resume());

// ===== BURBUJAS =====
function agregar(user, texto, esSam=false){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "bubble " + (esSam ? "sam" : "user");
  div.innerHTML = `<b>${user}</b><br>${texto}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ===== ONBOARDING =====
function pedirNombre(){
  esperandoNombre = true;
  agregar("Sam", "¿Cómo te llamas?", true);
}

if (!nombre){
  setTimeout(pedirNombre, 800);
} else {
  agregar("Sam", `hola ${nombre} 👀`, true);
}

// ===== ENVIAR =====
function send(){
  const msg = document.getElementById("msg").value;
  if (!msg) return;

  document.getElementById("msg").value = "";

  // 👉 si está pidiendo nombre
  if (esperandoNombre){
    nombre = msg.trim();
    localStorage.setItem("nombre", nombre);
    esperandoNombre = false;

    agregar(nombre, msg, false);

    setTimeout(()=>{
      agregar("Sam", `ok ${nombre}, a ver qué traes 👀`, true);
    }, 600);

    return;
  }

  if (!nombre){
    pedirNombre();
    return;
  }

  agregar(nombre, msg, false);

  socket.emit("msg", {
    nombre,
    mensaje: msg,
    sessionId
  });
}

// ===== SOCKETS =====
socket.on("chat", (m)=>{
  agregar(m.nombre, m.mensaje, false);
});

socket.on("sam", (m)=>{
  setTimeout(()=>{
    agregar("Sam", m.text, true);

    if (window.location.hash === "#main"){
      hablar(m.text);
    }
  }, 600 + Math.random()*600);
});
</script>

</body>
</html>
