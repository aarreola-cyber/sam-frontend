<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sam Live</title>
</head>

<body style="background:black;color:white;font-family:sans-serif;margin:0;padding:20px;">

<h2>Sam Live</h2>

<div id="chat" style="height:60vh;overflow:auto;border:1px solid #333;padding:10px;"></div>

<br>

<input id="nombre" placeholder="Tu nombre" style="width:30%;">
<input id="msg" placeholder="Escribe..." style="width:50%;">
<button onclick="send()">Enviar</button>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const API_URL = "https://sam-backend-production-cafb.up.railway.app";
const socket = io(API_URL);

const sessionId = "evento-cda";

function send(){
  const nombre = document.getElementById("nombre").value;
  const msg = document.getElementById("msg").value;

  if(!nombre || !msg) return;

  socket.emit("msg", {
    nombre,
    mensaje: msg,
    sessionId
  });

  document.getElementById("msg").value = "";
}

// ===== CHAT =====
function agregar(user, txt){
  const chat = document.getElementById("chat");
  chat.innerHTML += `<p><b>${user}:</b> ${txt}</p>`;
  chat.scrollTop = chat.scrollHeight;
}

// ===== VOZ =====
function hablar(texto){
  const speech = new SpeechSynthesisUtterance(texto);

  speech.lang = "es-MX";
  speech.rate = 0.95;
  speech.pitch = 1.05;

  speechSynthesis.speak(speech);
}

// activar audio (importante)
document.body.addEventListener("click", () => {
  speechSynthesis.resume();
});

// ===== SOCKETS =====
socket.on("chat", (m)=>{
  agregar(m.nombre, m.mensaje);
});

socket.on("sam", (m)=>{
  agregar("Sam", m.text);

  // solo pantalla principal habla
  if(window.location.hash === "#main"){
    hablar(m.text);
  }
});
</script>

</body>
</html>
